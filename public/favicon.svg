<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1d4ed8"/>
  
  <!-- Clock circle -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- Clock hands -->
  <line x1="16" y1="16" x2="16" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="21" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="white"/>
  
  <!-- Alert dot (top right) -->
  <circle cx="25" cy="7" r="4" fill="#ef4444"/>
  <text x="25" y="10.5" text-anchor="middle" font-size="6" fill="white" font-family="Arial" font-weight="bold">!</text>
</svg>
